<!DOCTYPE html>
<html>

<head>
    <title>Chunk Progress Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Center of Zagreb in HTRS96/TM (EPSG:3765)
        const centerE = 500000;
        const centerN = 5080000;
        const gridSize = 1000; // meters

        // Helper: HTRS96/TM to WGS84 (approximate, for visualization)
        function htrs96ToWgs84(e, n) {
            const baseLon = 15.9819;
            const baseLat = 45.8150;
            const metersPerDegreeLat = 111320;
            const metersPerDegreeLon = 78800; // at Zagreb's latitude
            return [
                baseLat + (n - centerN) / metersPerDegreeLat,
                baseLon + (e - centerE) / metersPerDegreeLon
            ];
        }

        // Initialize map
        var map = L.map('map').setView([45.8150, 15.9819], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Store drawn rectangles so we can clear them
        let drawnRectangles = [];

        function drawChunks(chunks) {
            // Remove old rectangles
            drawnRectangles.forEach(rect => map.removeLayer(rect));
            drawnRectangles = [];
            // Draw each processed chunk as a rectangle
            chunks.forEach(chunk => {
                const swE = centerE + chunk.x * gridSize;
                const swN = centerN + chunk.y * gridSize;
                const neE = centerE + (chunk.x + 1) * gridSize;
                const neN = centerN + (chunk.y + 1) * gridSize;
                const sw = htrs96ToWgs84(swE, swN);
                const ne = htrs96ToWgs84(neE, neN);
                const rect = L.rectangle([sw, ne], {
                    color: '#3388ff',
                    weight: 1,
                    fillOpacity: 0.3
                }).addTo(map);
                drawnRectangles.push(rect);
            });
        }

        function loadChunksAndDraw() {
            // Remove any previous script tag
            const oldScript = document.getElementById('chunks-script');
            if (oldScript) oldScript.remove();
            // Remove the global variable so we can detect if it loads
            window.processedChunks = undefined;
            // Dynamically load chunks.js
            const script = document.createElement('script');
            script.id = 'chunks-script';
            script.src = 'chunks.js?t=' + Date.now(); // cache busting
            script.onload = function () {
                if (window.processedChunks && Array.isArray(window.processedChunks)) {
                    drawChunks(window.processedChunks);
                }
            };
            script.onerror = function () {
                // If file not found, do nothing (leave existing tiles)
            };
            document.body.appendChild(script);
        }

        // Initial load
        loadChunksAndDraw();
        // Reload every 10 seconds
        setInterval(loadChunksAndDraw, 10000);
    </script>
</body>

</html>
