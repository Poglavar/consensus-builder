server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.urbangametheory.xyz;

    ssl_certificate /etc/ssl/certs/urbangametheory.crt;
    ssl_certificate_key /etc/ssl/private/urbangametheory.key;

    client_max_body_size 50m;

    # CORS is handled exclusively by Express (`cors()` middleware in backend/index.js).
    # Adding the headers here as well caused duplicate `Access-Control-Allow-Origin`
    # values (e.g. "https://zagreb.lol, https://zagreb.lol") which browsers reject.

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }
}
