services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    # Mount local frontend code for live reload
    volumes:
      - ./frontend:/usr/share/nginx/html

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      API_PORT: 3000
      ENABLE_DEV_CORS: "true"
      # No CORS_ALLOWLIST in local dev: backend only binds to localhost:3000 on the host,
      # so any localhost port (any worktree, any frontend dev server) is allowed via the
      # localhost regex in backend/index.js.
    ports:
      - "3000:3000"
    depends_on:
      - db
    # Mount local backend code for live reload
    volumes:
      - ./backend:/app
      - /app/node_modules
      # backend/buildings/carve.js requires ../../frontend/js/corridor-carve.js — the ONE module
      # that decides whether a proposal demolished, cut or tunnelled under an existing building, so
      # the server and the browser cannot disagree. On the server the whole repo is checked out and
      # that relative path just works; here the backend is mounted alone at /app, so the frontend
      # sources have to be mounted at the path the require resolves to.
      - ./frontend:/frontend:ro
    # Sync deps into the mounted node_modules volume before starting nodemon.
    command: sh -c "npm install && npx nodemon server.js"

  db:
    image: my-postgis:17-3.5-arm64
    restart: always
    environment:
      POSTGRES_DB: consensus
      POSTGRES_USER: consensus
      POSTGRES_PASSWORD: consensus
    ports:
      - "5432:5432"
    volumes:
      - pgdata_arm_postgis_v17:/var/lib/postgresql/data

    command: >
      postgres
      -c max_wal_size=8GB
      -c min_wal_size=2GB
      -c checkpoint_completion_target=0.9
      -c wal_compression=on

volumes:
  pgdata_arm_postgis_v17:
    external: true
    name: pgdata_arm_postgis_v17
