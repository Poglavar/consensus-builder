services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    # Mount local frontend code for live reload
    volumes:
      - ./frontend:/usr/share/nginx/html

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      API_PORT: 3000
      ENABLE_DEV_CORS: "true"
      CORS_ALLOWLIST: "http://localhost:8080,http://127.0.0.1:8080"
    ports:
      - "3000:3000"
    depends_on:
      - db
    # Mount local backend code for live reload
    volumes:
      - ./backend:/app
      - /app/node_modules
    # Sync deps into the mounted node_modules volume before starting nodemon.
    command: sh -c "npm install && npx nodemon server.js"

  db:
    image: my-postgis:17-3.5-arm64
    restart: always
    environment:
      POSTGRES_DB: consensus
      POSTGRES_USER: consensus
      POSTGRES_PASSWORD: consensus
    ports:
      - "5432:5432"
    volumes:
      - pgdata_arm_postgis_v17:/var/lib/postgresql/data

    command: >
      postgres
      -c max_wal_size=8GB
      -c min_wal_size=2GB
      -c checkpoint_completion_target=0.9
      -c wal_compression=on

volumes:
  pgdata_arm_postgis_v17:
    external: true
    name: pgdata_arm_postgis_v17
