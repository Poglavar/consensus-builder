<!doctype html>
<!-- Canton chain option — minimal read-only view of a party's proposals/sales.
     Standalone for now; becomes the party-perspective surface in a later step. -->
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Canton — Proposals</title>
    <link rel="stylesheet" href="css/canton.css?v=2" />
</head>
<body>
    <main class="canton-wrap">
        <h1>Canton — Proposals</h1>
        <p class="canton-sub">Read-only view. Enter a party ID to see proposals addressed to it and its completed sales.</p>

        <div class="canton-controls">
            <input id="canton-party" type="text" placeholder="party id (hint::fingerprint)" autocomplete="off" />
            <button id="canton-load" type="button">Load</button>
        </div>
        <div id="canton-status" class="canton-status"></div>

        <section class="canton-section canton-create">
            <h2>Create proposal</h2>
            <p class="canton-hint">Leave party fields blank to auto-allocate demo parties. After creating, the owner's view loads automatically.</p>
            <div class="canton-form">
                <label>Parcel ID<input id="create-parcel" type="text" value="PARCEL-1" /></label>
                <label>Price<input id="create-price" type="text" value="100.0" /></label>
                <label>Buyer (optional)<input id="create-buyer" type="text" placeholder="auto" autocomplete="off" /></label>
                <label>Owner (optional)<input id="create-owner" type="text" placeholder="auto" autocomplete="off" /></label>
                <label>Lens (optional)<input id="create-lens" type="text" placeholder="auto" autocomplete="off" /></label>
            </div>
            <button id="create-btn" type="button">Create proposal</button>
            <div id="create-result" class="canton-result"></div>
        </section>

        <section class="canton-section">
            <h2>Proposals</h2>
            <div id="canton-proposals"></div>
        </section>

        <section class="canton-section">
            <h2>Sales</h2>
            <div id="canton-sales"></div>
        </section>
    </main>

    <script src="js/canton/canton-read.js?v=2" defer></script>
</body>
</html>
